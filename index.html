<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Idle Game Prototype</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="game-container">
        <h1>Idle Game</h1>
        <div id="stats">
            <p id="income-display">Coins: 0</p>
            <p id="total-display">Coins per click: 1<br>Passive Income: 0 coins/second</p>
        </div>
        <button id="clickable-area" style="width: 100%; padding: 20px; font-size: 18px;">Click Me!</button>
        <button id="upgrade-btn" style="width: 100%; padding: 10px; margin-top: 10px;">Buy Upgrade (Cost: 10)</button>
        <div class="shop">
            <h2>Shop</h2>
        </div>
    </div>
    <script src="game.js"></script>
</body>
</html>
